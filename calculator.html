<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator - Lexio AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="home-styles.css">
    <link rel="stylesheet" href="calculator-styles.css">
    <script src="transitions.js"></script>
    <script src="auth.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Top Bar -->
        <div class="top-bar">
            <button class="credits-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2L13.09 8.26L20 9L13.09 9.74L12 16L10.91 9.74L4 9L10.91 8.26L12 2Z" fill="currentColor"/>
                </svg>
                Credits
            </button>
            
            <button class="logout-btn" onclick="handleLogout()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Logout
            </button>
        </div>

        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">Lexio AI</span>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M3 12H21M3 6H21M3 18H21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            
            <nav class="sidebar-nav">
                <button class="nav-btn" onclick="window.location.href='home.html'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M3 9L12 2L21 9V20A2 2 0 0 1 19 22H5A2 2 0 0 1 3 20V9Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <polyline points="9,22 9,12 15,12 15,22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Overview</span>
                </button>
                <button class="nav-btn" onclick="window.location.href='notes.html'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M14 2H6A2 2 0 0 0 4 4V20A2 2 0 0 0 6 22H18A2 2 0 0 0 20 20V8L14 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <polyline points="14,2 14,8 20,8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <line x1="16" y1="13" x2="8" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <line x1="16" y1="17" x2="8" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <polyline points="10,9 9,9 8,9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Notes</span>
                </button>
                <button class="nav-btn active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <rect x="4" y="4" width="16" height="16" rx="2" ry="2" stroke="currentColor" stroke-width="2"/>
                        <rect x="9" y="9" width="6" height="6" stroke="currentColor" stroke-width="2"/>
                        <line x1="9" y1="1" x2="9" y2="4" stroke="currentColor" stroke-width="2"/>
                        <line x1="15" y1="1" x2="15" y2="4" stroke="currentColor" stroke-width="2"/>
                        <line x1="9" y1="20" x2="9" y2="23" stroke="currentColor" stroke-width="2"/>
                        <line x1="15" y1="20" x2="15" y2="23" stroke="currentColor" stroke-width="2"/>
                        <line x1="20" y1="9" x2="23" y2="9" stroke="currentColor" stroke-width="2"/>
                        <line x1="20" y1="14" x2="23" y2="14" stroke="currentColor" stroke-width="2"/>
                        <line x1="1" y1="9" x2="4" y2="9" stroke="currentColor" stroke-width="2"/>
                        <line x1="1" y1="14" x2="4" y2="14" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <span>Calculator</span>
                </button>
                <button class="nav-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                        <path d="M19.4 15A1.65 1.65 0 0 0 21 13.35A1.65 1.65 0 0 0 19.4 11.65L18.7 11.65A7.81 7.81 0 0 0 17 9.74L17.66 9.08A1.65 1.65 0 0 0 17.66 6.42A1.65 1.65 0 0 0 15 6.42L14.34 7.08A7.81 7.81 0 0 0 12.35 6.35V5.65A1.65 1.65 0 0 0 10.7 4A1.65 1.65 0 0 0 9.05 5.65V6.35A7.81 7.81 0 0 0 7.08 7.08L6.42 6.42A1.65 1.65 0 0 0 3.76 6.42A1.65 1.65 0 0 0 3.76 9.08L4.42 9.74A7.81 7.81 0 0 0 3.35 11.65H2.65A1.65 1.65 0 0 0 1 13.35A1.65 1.65 0 0 0 2.65 15H3.35A7.81 7.81 0 0 0 4.42 16.92L3.76 17.58A1.65 1.65 0 0 0 3.76 20.24A1.65 1.65 0 0 0 6.42 20.24L7.08 19.58A7.81 7.81 0 0 0 9.05 20.65V21.35A1.65 1.65 0 0 0 10.7 23A1.65 1.65 0 0 0 12.35 21.35V20.65A7.81 7.81 0 0 0 14.34 19.58L15 20.24A1.65 1.65 0 0 0 17.66 20.24A1.65 1.65 0 0 0 17.66 17.58L17 16.92A7.81 7.81 0 0 0 18.7 15Z" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <span>Settings</span>
                </button>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="calculator-header">
                <div class="calculator-title-section">
                    <h1 class="calculator-title">Calculator</h1>
                    <p class="calculator-subtitle">Scientific calculator for your studies</p>
                </div>
            </div>

            <div class="calculator-container">
                <div class="calculator">
                    <!-- Display -->
                    <div class="calculator-display">
                        <div class="display-history" id="history"></div>
                        <div class="display-current" id="display">0</div>
                    </div>

                    <!-- Buttons -->
                    <div class="calculator-buttons">
                        <!-- Row 1: Memory and Clear -->
                        <button class="btn btn-function" onclick="calculator.clear()">C</button>
                        <button class="btn btn-function" onclick="calculator.clearEntry()">CE</button>
                        <button class="btn btn-function" onclick="calculator.backspace()">⌫</button>
                        <button class="btn btn-operator" onclick="calculator.inputOperator('/')">÷</button>

                        <!-- Row 2: Numbers and operators -->
                        <button class="btn btn-number" onclick="calculator.inputNumber('7')">7</button>
                        <button class="btn btn-number" onclick="calculator.inputNumber('8')">8</button>
                        <button class="btn btn-number" onclick="calculator.inputNumber('9')">9</button>
                        <button class="btn btn-operator" onclick="calculator.inputOperator('*')">×</button>

                        <!-- Row 3 -->
                        <button class="btn btn-number" onclick="calculator.inputNumber('4')">4</button>
                        <button class="btn btn-number" onclick="calculator.inputNumber('5')">5</button>
                        <button class="btn btn-number" onclick="calculator.inputNumber('6')">6</button>
                        <button class="btn btn-operator" onclick="calculator.inputOperator('-')">−</button>

                        <!-- Row 4 -->
                        <button class="btn btn-number" onclick="calculator.inputNumber('1')">1</button>
                        <button class="btn btn-number" onclick="calculator.inputNumber('2')">2</button>
                        <button class="btn btn-number" onclick="calculator.inputNumber('3')">3</button>
                        <button class="btn btn-operator" onclick="calculator.inputOperator('+')">+</button>

                        <!-- Row 5 -->
                        <button class="btn btn-number" onclick="calculator.toggleSign()">±</button>
                        <button class="btn btn-number" onclick="calculator.inputNumber('0')">0</button>
                        <button class="btn btn-number" onclick="calculator.inputDecimal()">.</button>
                        <button class="btn btn-equals" onclick="calculator.calculate()">=</button>

                        <!-- Scientific Functions Row -->
                        <button class="btn btn-function" onclick="calculator.inputFunction('sqrt')">√</button>
                        <button class="btn btn-function" onclick="calculator.inputFunction('pow')">x²</button>
                        <button class="btn btn-function" onclick="calculator.inputFunction('sin')">sin</button>
                        <button class="btn btn-function" onclick="calculator.inputFunction('cos')">cos</button>

                        <!-- More Scientific Functions -->
                        <button class="btn btn-function" onclick="calculator.inputFunction('tan')">tan</button>
                        <button class="btn btn-function" onclick="calculator.inputFunction('log')">log</button>
                        <button class="btn btn-function" onclick="calculator.inputFunction('ln')">ln</button>
                        <button class="btn btn-function" onclick="calculator.inputConstant('pi')">π</button>
                    </div>
                </div>

                <!-- History Panel -->
                <div class="calculator-history">
                    <h3>History</h3>
                    <div class="history-list" id="historyList">
                        <p class="no-history">No calculations yet</p>
                    </div>
                    <button class="clear-history-btn" onclick="calculator.clearHistory()">Clear History</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize calculator page
        document.addEventListener('DOMContentLoaded', function() {
            // Check authentication
            if (typeof auth !== 'undefined') {
                auth.checkAuth();
            }
            
            // Initialize sidebar toggle functionality
            const sidebar = document.getElementById('sidebar');
            const sidebarToggle = document.getElementById('sidebarToggle');
            
            if (sidebarToggle && sidebar) {
                sidebarToggle.addEventListener('click', function() {
                    sidebar.classList.toggle('collapsed');
                });
            }
        });
        
        // Logout functionality
        function handleLogout() {
            if (typeof auth !== 'undefined') {
                const result = auth.logout();
                if (result.success) {
                    window.location.href = 'index.html';
                }
            } else {
                window.location.href = 'index.html';
            }
        }
    </script>
    <script src="calculator.js"></script>
</body>
</html>
