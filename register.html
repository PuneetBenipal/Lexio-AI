<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Lexio AI</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="transitions.js"></script>
    <script src="auth.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-content">
            <div class="auth-header">
                <h1>Join Lexio AI</h1>
                <p>Start your journey to smarter studying</p>
            </div>
            
            <form class="auth-form" id="registerForm">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </div>
                
                <div class="form-group checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="terms" name="terms" required>
                        <span class="checkmark"></span>
                        I agree to the <a href="#" class="link">Terms of Service</a> and <a href="#" class="link">Privacy Policy</a>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary auth-btn">Create Account</button>
            </form>
            
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html" class="link">Sign in here</a></p>
                <p><a href="index.html" class="link">← Back to Home</a></p>
            </div>
        </div>
        
        <div class="auth-visual">
            <div class="floating-books">
                <div class="book-small book-1"></div>
                <div class="book-small book-2"></div>
                <div class="book-small book-3"></div>
            </div>
            <div class="brain-small">
                <div class="neural-glow"></div>
            </div>
        </div>
    </div>
</body>
</html>
