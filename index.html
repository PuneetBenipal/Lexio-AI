<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexio AI - Let we Assist You in Studies!</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="transitions.js"></script>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="tagline">
                AS LEXIO,WE PROVIDE BEST QUALITY!
            </div>
            
            <h1 class="main-heading">
                Let we Assist You in<br>
                <span class="highlight">Studies!</span>
            </h1>
            
            <div class="buttons">
                <button class="btn btn-primary" onclick="window.location.href='register.html'">LET'S GO!</button>
                <button class="btn btn-secondary" onclick="window.location.href='login.html'">SIGN IN/LOGIN</button>
            </div>
        </div>
        
        <div class="visual-elements">
            <div class="book book-1"></div>
            <div class="book book-2"></div>
            <div class="book book-3"></div>
            <div class="book book-4"></div>
            <div class="brain-container">
                <div class="brain"></div>
                <div class="neural-network">
                    <div class="node node-1"></div>
                    <div class="node node-2"></div>
                    <div class="node node-3"></div>
                    <div class="node node-4"></div>
                    <div class="connection connection-1"></div>
                    <div class="connection connection-2"></div>
                    <div class="connection connection-3"></div>
                </div>
            </div>
        </div>
        
        <div class="floating-particles">
            <div class="particle particle-1"></div>
            <div class="particle particle-2"></div>
            <div class="particle particle-3"></div>
            <div class="particle particle-4"></div>
            <div class="particle particle-5"></div>
        </div>
    </div>
</body>
</html>
